name: Monthly CPRA cycle
on:
  schedule:
    - cron: "0 15 1 * *"   # 1st of each month, ~7am PT
  workflow_dispatch: {}     # adds a manual "Run workflow" button

permissions:
  contents: write

jobs:
  cpra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Build DB and generate request drafts
        working-directory: pipeline
        run: |
          python db.py
          python generate_requests.py
          # Drafts only. To auto-email, add SMTP secrets in repo Settings ->
          # Secrets, write config.ini from them in a prior step, and add --send
      - name: Check deadlines, generate escalation letters
        working-directory: pipeline
        run: python deadlines.py --letters
      - name: Watch for ordinance changes (refetch source data + diff)
        working-directory: pipeline
        run: python ordinance_watch.py --refetch
      - name: Refresh full CA jurisdiction list (Census + Wikipedia check)
        working-directory: pipeline
        run: python build_full_jurisdictions.py || echo "kept existing list"
      - name: Rebuild ordinance map layer
        working-directory: pipeline
        run: python build_ordinance_map.py
      - name: Export map data
        working-directory: pipeline
        run: python export_map_data.py
      - name: Commit outputs
        run: |
          git config user.name "sweep-watch-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -f outbox site/data.json site/ordinances.json \
                     data/ordinance_snapshots data/ordinance_changes.csv \
                     data/all_jurisdictions.csv data/berkeley_appendix 2>/dev/null || true
          git commit -m "Monthly CPRA + ordinance-watch cycle $(date +%Y-%m)" || echo "nothing to commit"
          git push
