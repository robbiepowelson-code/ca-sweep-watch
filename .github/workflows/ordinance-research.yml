name: Ordinance research (Municode scan)
on:
  schedule:
    - cron: "0 16 * * 1"   # Mondays ~8am PT
  workflow_dispatch:
    inputs:
      batch:
        description: "jurisdictions to scan this run"
        default: "80"

permissions:
  contents: write

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Scan municipal codes for homelessness-enforcement keywords
        working-directory: pipeline
        run: python find_ordinances.py --batch ${{ github.event.inputs.batch || 80 }}
      - name: Rebuild ordinance map layer
        working-directory: pipeline
        run: python build_ordinance_map.py
      - name: Commit results
        run: |
          git config user.name "sweep-watch-bot"
          git config user.email "actions@users.noreply.github.com"
          for p in data/ordinance_research.csv data/research_progress.json site/ordinances.json; do
            git add -f "$p" 2>/dev/null || true
          done
          git commit -m "Ordinance research batch $(date +%Y-%m-%d)" || echo "nothing to commit"
          git push
